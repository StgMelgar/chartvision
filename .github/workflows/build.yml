name: Build ChartVision Installers

on:
  push:
    branches: [ main ]
    paths:
      - '**.py'
      - '**/requirements.txt'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: "ChartVision-v1.0 3"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install anthropic mss Pillow pandas openpyxl matplotlib requests

      - name: Build Mac app
        run: |
          pyinstaller --noconfirm --windowed \
            --name "ChartVision" \
            --icon AppIcon.icns \
            --add-data "strategies:strategies" \
            --add-data "AppIcon.png:." \
            --hidden-import tkinter \
            --hidden-import PIL._tkinter_finder \
            chart_vision_app.py

      - name: Create DMG
        run: |
          cd dist
          hdiutil create -volname "ChartVision" -srcfolder "ChartVision.app" -ov -format UDZO "ChartVision-Mac.dmg"

      - name: Upload Mac build
        uses: actions/upload-artifact@v4
        with:
          name: ChartVision-Mac
          path: "ChartVision-v1.0 3/dist/ChartVision-Mac.dmg"

  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: "ChartVision-v1.0 3"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller
          pip install anthropic mss Pillow pandas openpyxl matplotlib requests

      - name: Build Windows exe
        run: |
          pyinstaller --noconfirm --windowed --onefile `
            --name "ChartVision" `
            --add-data "strategies;strategies" `
            --add-data "AppIcon.png;." `
            --hidden-import tkinter `
            --hidden-import PIL._tkinter_finder `
            chart_vision_app.py

      - name: Upload Windows build
        uses: actions/upload-artifact@v4
        with:
          name: ChartVision-Windows
          path: "ChartVision-v1.0 3/dist/ChartVision.exe"

  create-release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Download Mac artifact
        uses: actions/download-artifact@v4
        with:
          name: ChartVision-Mac
          path: ./release

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ChartVision-Windows
          path: ./release

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: ChartVision Latest Build
          files: |
            ./release/ChartVision-Mac.dmg
            ./release/ChartVision.exe
          draft: false
          prerelease: false
          make_latest: "true"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
